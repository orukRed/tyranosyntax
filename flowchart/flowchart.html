<script>
  console.log("flowchart.html");

  // タグごとの「エッジ（矢印）色」。ノードではなく矢印に適用する。
  const TAG_EDGE_COLOR = {
    jump: "#1d4ed8",
    button: "#c2410c",
    glink: "#15803d",
    call: "#7c3aed",
    scenario: "#a16207",
    script: "#b91c1c",
    html: "#a21caf",
    css: "#0e7490",
  };

  const COMMON_CLASS_DEFS = [
    // 別ファイルへのリーフノード
    "classDef green fill:#e3faea,stroke:#333,stroke-width:2px;",
    // 同じファイルのラベル（遷移元・遷移先のいずれか）
    "classDef label fill:#e9d5ff,stroke:#7c3aed,stroke-width:2px;",
  ];

  const sanitizeId = (s) => (s || "").replace(/[^a-zA-Z0-9]/g, "_");
  const escapeMermaidLabel = (s) =>
    (s || "").replace(/"/g, "#quot;").replace(/\n/g, " ");

  // nodeClasses (id -> className) を Mermaid の class ステートメントに整形
  function emitClassStatements(nodeClasses) {
    const byClass = {};
    for (const [id, cls] of Object.entries(nodeClasses)) {
      (byClass[cls] ||= []).push(id);
    }
    let out = "";
    for (const [cls, ids] of Object.entries(byClass)) {
      out += `class ${ids.join(",")} ${cls}\n`;
    }
    return out;
  }

  // edgeStyles ([{tag, dashed}, ...]) を Mermaid の linkStyle ステートメントに整形。
  // tag→色は TAG_EDGE_COLOR を参照。dashed のときは stroke-dasharray も付与。
  function emitLinkStyles(edgeStyles) {
    const groups = {}; // "color|dashed" -> [edgeIndex,...]
    for (let i = 0; i < edgeStyles.length; i++) {
      const e = edgeStyles[i];
      const color = TAG_EDGE_COLOR[e.tag];
      if (!color) continue;
      const key = `${color}|${e.dashed ? "1" : "0"}`;
      (groups[key] ||= []).push(i);
    }
    let out = "";
    for (const [key, idxs] of Object.entries(groups)) {
      const [color, dashed] = key.split("|");
      const dashPart = dashed === "1" ? ",stroke-dasharray:5 5" : "";
      out += `linkStyle ${idxs.join(",")} stroke:${color},stroke-width:2px${dashPart}\n`;
    }
    return out;
  }

  // 単一ファイルモード（既存の挙動 + クリック遷移 + タグ色分け + 破線条件分岐）
  function generateFlowchart(obj, labels, currentFile, storageResolution) {
    console.log(obj, labels);
    let graphDefinition = "graph LR\n";
    graphDefinition += COMMON_CLASS_DEFS.join("\n") + "\n";

    const hasTransitions = obj && obj.length > 0;
    const hasLabels = labels && labels.length > 0;

    if (!hasTransitions && !hasLabels) {
      graphDefinition += `subgraph "\`**このファイルから他のラベル、シナリオへの遷移はありません**\`"\n`;
      graphDefinition += `end\n`;
      return `<pre class="mermaid">${graphDefinition}</pre>`;
    }

    const subgraphLabel = hasTransitions ? obj[0].currentFile : currentFile;
    graphDefinition += `subgraph "\`**${subgraphLabel}**\`"\n`;

    const addedNodes = {};
    const toNodeId = (label) => `node_${sanitizeId(label)}`;
    const clickStatements = [];
    const nodeClasses = {};
    const edgeStyles = []; // edgeIndex -> {tag, dashed}

    if (hasTransitions) {
      for (const key in obj) {
        const t = obj[key];
        const condition = t.condition ? `${t.condition}` : "";
        const dashed = !!condition;
        const arrow = dashed ? "-.->" : "-->";
        const labelPart = condition
          ? `|"${escapeMermaidLabel(condition)}"|`
          : "";

        const currentLabel = t.currentLabel;
        const nodeId = toNodeId(currentLabel);
        addedNodes[nodeId] = true;
        // 遷移元（=このファイルのラベル）にも label クラス
        nodeClasses[nodeId] = "label";

        // storage + target / storage only -> クロスファイル
        if (t.storage) {
          const targetPart = t.target ? `_${t.target}` : "_NONE";
          const fileName = `${t.storage}${targetPart}`;
          const fileId = sanitizeId(`file_${t.storage}${targetPart}`);
          graphDefinition += `${nodeId}["${escapeMermaidLabel(currentLabel)}"] ${arrow}${labelPart} ${fileId}["${escapeMermaidLabel(fileName)}"]\n`;
          nodeClasses[fileId] = "green";
          edgeStyles.push({ tag: t.tag, dashed });
          // クロスファイルクリック遷移
          if (storageResolution) {
            const resolvedAbs =
              storageResolution[t.storage] ||
              storageResolution[t.storage.replace(/\\/g, "/")];
            if (resolvedAbs) {
              const targetUrl = `/flowchart.html?scenario=${encodeURIComponent(resolvedAbs)}`;
              clickStatements.push(
                `click ${fileId} "${targetUrl}" "${escapeMermaidLabel(t.storage)} を開く"`,
              );
            }
          }
        } else if (t.target) {
          const targetLabel = t.target;
          const targetId = toNodeId(targetLabel);
          addedNodes[targetId] = true;
          graphDefinition += `${nodeId}["${escapeMermaidLabel(currentLabel)}"] ${arrow}${labelPart} ${targetId}["${escapeMermaidLabel(targetLabel)}"]\n`;
          // 同じファイルの到達先ラベルは label クラス
          nodeClasses[targetId] = "label";
          edgeStyles.push({ tag: t.tag, dashed });
        }
      }
    }

    if (hasLabels) {
      for (const labelName of labels) {
        const nodeId = toNodeId(labelName);
        if (!addedNodes[nodeId]) {
          addedNodes[nodeId] = true;
          graphDefinition += `${nodeId}["${escapeMermaidLabel(labelName)}"]\n`;
        }
        // 孤立ラベル含めすべてのラベルを label クラスに
        nodeClasses[nodeId] = "label";
      }
    }

    graphDefinition += `end\n`;
    graphDefinition += emitClassStatements(nodeClasses);
    graphDefinition += emitLinkStyles(edgeStyles);
    if (clickStatements.length) {
      graphDefinition += clickStatements.join("\n") + "\n";
    }
    console.log(graphDefinition);
    return `<pre class="mermaid">${graphDefinition}</pre>`;
  }

  // プロジェクト全体モード
  // files: [{filePath, relativePath, transitions, labels}]
  // visibleSet: Set<relativePath> (絞り込み後の表示対象)
  function generateProjectFlowchart(files, storageResolution, visibleSet) {
    let graphDefinition = "graph LR\n";
    graphDefinition += COMMON_CLASS_DEFS.join("\n") + "\n";

    if (!files || files.length === 0) {
      graphDefinition += `subgraph "\`**このプロジェクトには遷移可能なシナリオがありません**\`"\nend\n`;
      return `<pre class="mermaid">${graphDefinition}</pre>`;
    }

    // relativePath -> ファイル情報
    const fileByRel = {};
    for (const f of files) {
      fileByRel[f.relativePath] = f;
    }

    // 絶対パス -> relativePath（クロスファイル解決用）
    const absToRel = {};
    for (const f of files) {
      absToRel[f.filePath] = f.relativePath;
    }

    const fileHash = (rel) => sanitizeId(rel);
    const nodeId = (rel, label) =>
      `node_${fileHash(rel)}__${sanitizeId(label || "ENTRY")}`;

    // クロスファイル外部ノード（プロジェクト外、または非表示ファイル）
    const externalEdges = []; // {from, storage, target, condition, tag}

    // ノードクラス（id -> className）。最後に class ステートメントとして出力。
    const nodeClasses = {};
    // エッジスタイル（順序＝Mermaidのエッジindex）。最後に linkStyle で色を当てる。
    const edgeStyles = [];

    // 1) すべての可視ファイルの subgraph と、内部・クロスファイルエッジを生成
    const subgraphBlocks = []; // {rel, lines: string[]}
    const subgraphLabelSet = {}; // rel -> Set<nodeId>（追加済み判定）
    const ensureSubgraph = (rel) => {
      if (!subgraphLabelSet[rel]) {
        subgraphLabelSet[rel] = new Set();
        subgraphBlocks.push({ rel, lines: [] });
      }
    };
    const addNode = (rel, label) => {
      const id = nodeId(rel, label);
      ensureSubgraph(rel);
      if (!subgraphLabelSet[rel].has(id)) {
        subgraphLabelSet[rel].add(id);
        const block = subgraphBlocks.find((b) => b.rel === rel);
        block.lines.push(`${id}["${escapeMermaidLabel(label || "ENTRY")}"]`);
      }
      return id;
    };

    for (const file of files) {
      if (!visibleSet.has(file.relativePath)) continue;
      ensureSubgraph(file.relativePath);
      // ラベル先行追加（孤立ラベルも残す）。同じファイルのラベルなので label クラスに。
      for (const label of file.labels || []) {
        const id = addNode(file.relativePath, label);
        nodeClasses[id] = "label";
      }
    }

    const edgeLines = [];

    for (const file of files) {
      if (!visibleSet.has(file.relativePath)) continue;
      const rel = file.relativePath;

      for (const t of file.transitions || []) {
        const fromId = addNode(rel, t.currentLabel);
        nodeClasses[fromId] = "label";
        const condition = t.condition ? `${t.condition}` : "";
        const dashed = !!condition;
        const arrow = dashed ? "-.->" : "-->";
        const labelPart = condition
          ? `|"${escapeMermaidLabel(condition)}"|`
          : "";

        if (t.storage) {
          // クロスファイル: target ファイルを解決
          const storageNorm = t.storage.replace(/\\/g, "/");
          const resolvedAbs =
            storageResolution[t.storage] || storageResolution[storageNorm];
          const targetRel = resolvedAbs ? absToRel[resolvedAbs] : undefined;

          if (targetRel && visibleSet.has(targetRel)) {
            // 表示対象内: target の subgraph 内ノードへ直接刺す
            const targetLabel = t.target || "ENTRY";
            const targetFile = fileByRel[targetRel];
            const labelExists =
              t.target &&
              targetFile &&
              (targetFile.labels || []).includes(t.target);
            // ラベルが存在しなければ合成ENTRY扱い
            const useLabel = labelExists
              ? targetLabel
              : t.target
                ? targetLabel
                : "ENTRY";
            const toId = addNode(targetRel, useLabel);
            edgeLines.push(`${fromId} ${arrow}${labelPart} ${toId}`);
            nodeClasses[toId] = "label";
            edgeStyles.push({ tag: t.tag, dashed });
          } else {
            // プロジェクト外 or 非表示: external として緑リーフ
            externalEdges.push({
              fromId,
              storage: t.storage,
              target: t.target,
              condition,
              dashed,
              tag: t.tag,
              resolvedAbs,
            });
          }
        } else if (t.target) {
          // 同一ファイル内
          const toId = addNode(rel, t.target);
          edgeLines.push(`${fromId} ${arrow}${labelPart} ${toId}`);
          nodeClasses[toId] = "label";
          edgeStyles.push({ tag: t.tag, dashed });
        }
      }
    }

    // 2) external subgraph を構築
    const externalLines = [];
    const externalSet = new Set();
    const externalClicks = [];
    if (externalEdges.length > 0) {
      for (const e of externalEdges) {
        const targetPart = e.target ? `_${e.target}` : "_NONE";
        const extId = sanitizeId(`file_${e.storage}${targetPart}`);
        const labelText = `${e.storage}${targetPart}`;
        const dashed = !!e.dashed;
        const arrow = dashed ? "-.->" : "-->";
        const labelPart = e.condition
          ? `|"${escapeMermaidLabel(e.condition)}"|`
          : "";
        if (!externalSet.has(extId)) {
          externalSet.add(extId);
          externalLines.push(`${extId}["${escapeMermaidLabel(labelText)}"]`);
          nodeClasses[extId] = "green";
          // 解決済み（=非表示なだけ）の場合は単一ファイルビューへ遷移できる
          if (e.resolvedAbs) {
            externalClicks.push(
              `click ${extId} "/flowchart.html?scenario=${encodeURIComponent(e.resolvedAbs)}" "${escapeMermaidLabel(e.storage)} を開く"`,
            );
          }
        }
        edgeLines.push(`${e.fromId} ${arrow}${labelPart} ${extId}`);
        edgeStyles.push({ tag: e.tag, dashed });
      }
    }

    // 3) 出力組み立て
    for (const block of subgraphBlocks) {
      if (block.lines.length === 0) continue; // 空subgraphは出さない
      graphDefinition += `subgraph sg_${fileHash(block.rel)}["${escapeMermaidLabel(block.rel)}"]\n`;
      graphDefinition += block.lines.join("\n") + "\n";
      graphDefinition += `end\n`;
    }
    if (externalLines.length > 0) {
      graphDefinition += `subgraph sg__external["external"]\n`;
      graphDefinition += externalLines.join("\n") + "\n";
      graphDefinition += `end\n`;
    }
    if (edgeLines.length > 0) {
      graphDefinition += edgeLines.join("\n") + "\n";
    }
    graphDefinition += emitClassStatements(nodeClasses);
    graphDefinition += emitLinkStyles(edgeStyles);
    if (externalClicks.length > 0) {
      graphDefinition += externalClicks.join("\n") + "\n";
    }

    return `<pre class="mermaid">${graphDefinition}</pre>`;
  }

  // ============== ズーム・パン ==============
  let currentScale = 1;
  const MIN_SCALE = 0.2;
  const MAX_SCALE = 5;

  function applyScale(container, flowchart) {
    flowchart.style.transform = `scale(${currentScale})`;
  }

  function setupWheelZoom(container, flowchart) {
    container.addEventListener(
      "wheel",
      (e) => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        const newScale = Math.max(
          MIN_SCALE,
          Math.min(MAX_SCALE, currentScale * delta),
        );
        if (newScale === currentScale) return;

        const rect = container.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;
        const contentX = (container.scrollLeft + offsetX) / currentScale;
        const contentY = (container.scrollTop + offsetY) / currentScale;

        currentScale = newScale;
        flowchart.style.transform = `scale(${currentScale})`;

        container.scrollLeft = contentX * currentScale - offsetX;
        container.scrollTop = contentY * currentScale - offsetY;
      },
      { passive: false },
    );
  }

  function setupDragPan(container) {
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let startScrollLeft = 0;
    let startScrollTop = 0;

    container.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      // ノード（リンク）クリックはドラッグ扱いにしない
      if (e.target.closest("a")) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      startScrollLeft = container.scrollLeft;
      startScrollTop = container.scrollTop;
      container.classList.add("dragging");
      e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      container.scrollLeft = startScrollLeft - (e.clientX - startX);
      container.scrollTop = startScrollTop - (e.clientY - startY);
    });

    const endDrag = () => {
      if (!isDragging) return;
      isDragging = false;
      container.classList.remove("dragging");
    };
    document.addEventListener("mouseup", endDrag);
    window.addEventListener("blur", endDrag);
  }

  // ============== 検索ハイライト ==============
  function setupSearch(searchInput, matchCountEl) {
    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      const svg = document.querySelector("#flowchart svg");
      if (!svg) return;
      const nodes = svg.querySelectorAll("g.node");
      let matchCount = 0;
      let firstMatch = null;
      nodes.forEach((n) => {
        n.classList.remove("match-highlight");
        if (!q) return;
        const text = (n.textContent || "").toLowerCase();
        if (text.includes(q)) {
          n.classList.add("match-highlight");
          matchCount++;
          if (!firstMatch) firstMatch = n;
        }
      });
      if (matchCountEl) {
        matchCountEl.textContent = q ? `${matchCount} 件一致` : "";
      }
      if (firstMatch) {
        firstMatch.scrollIntoView({ block: "center", inline: "center" });
      }
    });
  }

  // ============== ダイアログ ==============
  function showConfirmDialog({ title, message, confirmLabel, cancelLabel }) {
    return new Promise((resolve) => {
      const backdrop = document.createElement("div");
      backdrop.className = "modal-backdrop";
      backdrop.innerHTML = `
        <div class="modal" role="dialog">
          <h4>${title}</h4>
          <p>${message}</p>
          <div class="modal-actions">
            <button type="button" class="secondary" data-action="cancel">${cancelLabel}</button>
            <button type="button" class="primary" data-action="confirm">${confirmLabel}</button>
          </div>
        </div>
      `;
      document.body.appendChild(backdrop);
      backdrop.addEventListener("click", (e) => {
        const action = e.target?.dataset?.action;
        if (action === "confirm" || action === "cancel") {
          document.body.removeChild(backdrop);
          resolve(action === "confirm");
        }
      });
    });
  }

  // ============== プロジェクト全体: 描画再実行 ==============
  let projectFiles = [];
  let projectStorageResolution = {};
  let visibleRelSet = new Set();

  async function renderProjectGraph() {
    const flowchart = document.getElementById("flowchart");
    flowchart.innerHTML = "";
    const html = generateProjectFlowchart(
      projectFiles,
      projectStorageResolution,
      visibleRelSet,
    );
    flowchart.innerHTML = html;
    await mermaid.run();
    currentScale = 0.7;
    applyScale(document.querySelector(".flowchart-container"), flowchart);
  }

  function buildFileFilterUI(files) {
    const list = document.getElementById("file-filter-list");
    list.innerHTML = "";
    const sorted = [...files].sort((a, b) =>
      a.relativePath.localeCompare(b.relativePath),
    );
    for (const f of sorted) {
      const id = `chk_${sanitizeId(f.relativePath)}`;
      const label = document.createElement("label");
      label.innerHTML = `<input type="checkbox" id="${id}" data-rel="${f.relativePath.replace(/"/g, "&quot;")}" checked> ${f.relativePath}`;
      list.appendChild(label);
    }
  }

  function readVisibleFromUI() {
    const set = new Set();
    document
      .querySelectorAll("#file-filter-list input[type=checkbox]")
      .forEach((c) => {
        if (c.checked) {
          set.add(c.dataset.rel);
        }
      });
    return set;
  }

  function setAllChecks(checked) {
    document
      .querySelectorAll("#file-filter-list input[type=checkbox]")
      .forEach((c) => (c.checked = checked));
  }

  // ============== エントリ ==============
  const urlParams = new URLSearchParams(window.location.search);
  const scope = urlParams.get("scope");
  const project = urlParams.get("project");
  const projectPathParam = urlParams.get("projectPath");
  const scenario = urlParams.get("scenario");

  document.addEventListener("DOMContentLoaded", async () => {
    const flowchartContainer = document.querySelector(".flowchart-container");
    const flowchartElement = document.getElementById("flowchart");

    setupWheelZoom(flowchartContainer, flowchartElement);
    setupDragPan(flowchartContainer);

    const searchInput = document.getElementById("search-box");
    const matchCount = document.getElementById("match-count");
    setupSearch(searchInput, matchCount);

    if (scope === "project") {
      // プロジェクト全体モード
      const fetchUrl =
        `/get-transition-data?scope=project&project=${encodeURIComponent(project || "")}` +
        (projectPathParam
          ? `&projectPath=${encodeURIComponent(projectPathParam)}`
          : "");
      const data = await fetch(fetchUrl).then((r) => r.json());
      if (!data || !data.files) {
        console.error("project data not found");
        return;
      }
      document.querySelector("h3").textContent =
        `${data.projectName} – プロジェクト全体`;
      projectFiles = data.files;
      projectStorageResolution = data.storageResolution || {};
      visibleRelSet = new Set(projectFiles.map((f) => f.relativePath));

      buildFileFilterUI(projectFiles);
      document.getElementById("project-tools").style.display = "";

      document
        .getElementById("btn-all-on")
        .addEventListener("click", () => setAllChecks(true));
      document
        .getElementById("btn-all-off")
        .addEventListener("click", () => setAllChecks(false));
      document
        .getElementById("btn-apply")
        .addEventListener("click", async () => {
          visibleRelSet = readVisibleFromUI();
          await renderProjectGraph();
        });

      // 閾値判定
      const total = data.totalNodes || 0;
      let proceed = true;
      if (total > 1500) {
        proceed = await showConfirmDialog({
          title: "ノード数が多すぎます",
          message: `合計 ${total} ノードあります。Mermaid は 1500 を超えるとレイアウトが崩れたり長時間応答しなくなる場合があります。<br>単一ファイル表示の利用、もしくは表示ファイルを絞り込むことを推奨します。<br><br>それでも今すぐ表示しますか？`,
          confirmLabel: "このまま表示",
          cancelLabel: "絞り込む",
        });
      } else if (total > 500) {
        proceed = await showConfirmDialog({
          title: "ノード数が多めです",
          message: `合計 ${total} ノードあります。表示には数秒かかる可能性があります。<br>表示するファイルを絞り込むこともできます。`,
          confirmLabel: "このまま表示",
          cancelLabel: "絞り込む",
        });
      }

      if (!proceed) {
        document.querySelector("details.file-filter").open = true;
        return;
      }
      await renderProjectGraph();
      return;
    }

    // 単一ファイルモード
    const data = await fetch(
      `/get-transition-data?scenario=${encodeURIComponent(scenario || "")}`,
    ).then((r) => r.json());
    if (!data) {
      console.log("transitionData is not found");
      return;
    }
    document.querySelector("h3").textContent = data.projectName || "";
    const transitionData = data.TransitionData;
    const labelData = data.LabelData || [];
    const storageResolution = data.storageResolution || {};
    const currentFile =
      (scenario || "").replace(/\\/g, "/").split("data/scenario/").pop() || "";
    const htmlContent = generateFlowchart(
      transitionData,
      labelData,
      currentFile,
      storageResolution,
    );
    flowchartElement.innerHTML += htmlContent;
    await mermaid.run();
  });
</script>
