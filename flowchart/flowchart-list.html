<!-- フローチャートのシナリオ一覧 -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenario List</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      #controls {
        margin-bottom: 15px;
      }
      #sort-toggle {
        padding: 8px 14px;
        font-size: 14px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      #sort-toggle:hover {
        background-color: #0056b3;
      }
      #scenario-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .project-container {
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 20px;
      }
      h3 {
        margin: 0 0 10px 0;
        color: #007bff;
      }
      a {
        color: #007bff;
        text-decoration: none;
        transition: color 0.3s ease;
      }
      a:hover {
        color: #0056b3;
      }
      .scenario {
        margin-bottom: 10px; /* 他の.scenarioとの間隔を調整 */
        padding: 10px 15px; /* クリックしやすいようにパディングを追加 */
        background-color: #e7e9ed; /* ボタンのような背景色 */
        border-radius: 5px; /* 角を丸く */
        cursor: pointer; /* マウスカーソルをポインターに */
        transition: background-color 0.3s ease; /* 背景色の変化を滑らかに */
      }
      .scenario:hover {
        background-color: #d1d3d6; /* ホバー時の背景色を暗く */
      }
      .folder {
        margin-bottom: 10px;
      }
      .folder > summary {
        cursor: pointer;
        padding: 8px 12px;
        background-color: #d9e3f0;
        border-radius: 5px;
        font-weight: bold;
        color: #333;
        list-style: none;
        user-select: none;
      }
      .folder > summary::before {
        content: '▶';
        display: inline-block;
        margin-right: 6px;
        transition: transform 0.2s ease;
      }
      .folder[open] > summary::before {
        transform: rotate(90deg);
      }
      .folder > summary::-webkit-details-marker {
        display: none;
      }
      .folder-content {
        padding: 10px 0 0 20px;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button id="sort-toggle" type="button">▲ 昇順</button>
    </div>
    <div id="scenario-list"></div>

    <script>
      let scenarioListData = null;
      let sortAsc = true;

      const compare = (a, b) => {
        const cmp = a.localeCompare(b, undefined, { sensitivity: 'base' });
        return sortAsc ? cmp : -cmp;
      };

      const escapeHtml = (str) =>
        str.replace(/[&<>"']/g, (c) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        }[c]));

      // scenarioName（ファイル名含む相対パス）からフォルダ構造のツリーを構築
      function buildTree(scenarios) {
        const root = { files: [], folders: {} };
        for (const scenario of scenarios) {
          const parts = scenario.scenarioName.split(/[\\/]/);
          const fileName = parts.pop();
          let cur = root;
          for (const folder of parts) {
            if (!cur.folders[folder]) {
              cur.folders[folder] = { files: [], folders: {} };
            }
            cur = cur.folders[folder];
          }
          cur.files.push({ fullPath: scenario.fullPath, fileName });
        }
        return root;
      }

      function renderNode(node) {
        const sortedFiles = [...node.files].sort((a, b) =>
          compare(a.fileName, b.fileName),
        );
        const sortedFolderNames = Object.keys(node.folders).sort(compare);

        let html = '';
        for (const file of sortedFiles) {
          html += `
            <a href="http://localhost:3200/flowchart.html?scenario=${encodeURIComponent(file.fullPath)}">
              <div class="scenario">${escapeHtml(file.fileName)}</div>
            </a>
          `;
        }
        for (const folderName of sortedFolderNames) {
          html += `
            <details class="folder">
              <summary>${escapeHtml(folderName)}/</summary>
              <div class="folder-content">
                ${renderNode(node.folders[folderName])}
              </div>
            </details>
          `;
        }
        return html;
      }

      function render() {
        const container = document.getElementById('scenario-list');
        if (!scenarioListData) {
          container.innerHTML = 'ERROR!';
          return;
        }
        const sortedProjectNames = Object.keys(scenarioListData).sort(compare);
        container.innerHTML = sortedProjectNames
          .map((projectName) => {
            const tree = buildTree(scenarioListData[projectName]);
            return `
              <div class="project-container">
                <h3>${escapeHtml(projectName)}</h3>
                ${renderNode(tree)}
              </div>
            `;
          })
          .join('');
      }

      document.getElementById('sort-toggle').addEventListener('click', () => {
        sortAsc = !sortAsc;
        document.getElementById('sort-toggle').textContent = sortAsc
          ? '▲ 昇順'
          : '▼ 降順';
        render();
      });

      fetch(`/get-scenario-list`)
        .then((response) => response.json())
        .then((data) => {
          scenarioListData = data.scenarioList;
          console.log('scenarioList', scenarioListData);
          render();
        })
        .catch((error) => console.error('Error:', error));
    </script>
  </body>
</html>
